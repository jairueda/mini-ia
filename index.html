<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini IA — Asistente</title>
<style>
  :root {
    --bg: #10131a;
    --panel: #171b24;
    --panel-2: #1e2330;
    --border: #2a3040;
    --text: #e8eaf0;
    --muted: #8891a5;
    --accent: #5eead4;
    --accent-dim: #1f4a44;
    --user-bubble: #2c3550;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(circle at 20% -10%, #1a2233 0%, var(--bg) 55%);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    color: var(--text);
  }
  .wrap {
    max-width: 720px;
    margin: 0 auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px 16px;
  }
  header {
    text-align: center;
    padding: 12px 0 20px;
  }
  header .tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid var(--accent-dim);
    background: rgba(94, 234, 212, 0.06);
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 10px;
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
  }
  header p {
    margin: 6px 0 0;
    color: var(--muted);
    font-size: 13px;
  }

  .chat-panel {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg {
    max-width: 82%;
    padding: 11px 15px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .msg.ia {
    align-self: flex-start;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .fuentes {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }
  .msg.pensando {
    align-self: flex-start;
    color: var(--muted);
    font-style: italic;
  }

  .input-row {
    display: flex;
    gap: 10px;
    padding: 14px;
    border-top: 1px solid var(--border);
    background: var(--panel);
  }
  .input-row input {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 14px;
    outline: none;
  }
  .input-row input:focus {
    border-color: var(--accent);
  }
  .input-row button {
    background: var(--accent);
    color: #06211d;
    border: none;
    padding: 0 20px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  .input-row button:disabled {
    opacity: 0.5;
    cursor: default;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 11px;
    padding-top: 12px;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="wrap">
  <header>
    <div class="tag">Base de conocimiento propia</div>
    <h1>Pregúntale a tu Mini IA</h1>
    <p>Responde únicamente con la información que le enseñaste</p>
  </header>

  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="msg ia">Hola 👋 Preguntame lo que quieras sobre el tema que cargué. Solo respondo con lo que sé de mi base de conocimiento.</div>
    </div>
    <div class="input-row">
      <input type="text" id="entrada" placeholder="Escribe tu pregunta..." autocomplete="off">
      <button id="enviar">Enviar</button>
    </div>
  </div>

  <footer>Mini IA · construida con RAG</footer>
</div>

<script>
  // ⚠️ IMPORTANTE: cambia esta URL por la de tu backend en Render
  // Ejemplo: "https://mi-mini-ia.onrender.com"
  const API_URL = "https://TU-BACKEND-EN-RENDER.onrender.com";

  const messagesEl = document.getElementById("messages");
  const entradaEl = document.getElementById("entrada");
  const enviarBtn = document.getElementById("enviar");

  function agregarMensaje(texto, tipo) {
    const div = document.createElement("div");
    div.className = "msg " + tipo;
    div.textContent = texto;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function enviarPregunta() {
    const pregunta = entradaEl.value.trim();
    if (!pregunta) return;

    agregarMensaje(pregunta, "user");
    entradaEl.value = "";
    enviarBtn.disabled = true;

    const pensando = agregarMensaje("Pensando...", "ia pensando");

    try {
      const resp = await fetch(API_URL + "/preguntar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pregunta }),
      });
      const data = await resp.json();

      pensando.remove();
      const msgDiv = agregarMensaje(data.respuesta, "ia");

      if (data.fuentes && data.fuentes.length) {
        const fuentesDiv = document.createElement("div");
        fuentesDiv.className = "fuentes";
        fuentesDiv.textContent = "Fuentes: " + data.fuentes.join(", ");
        msgDiv.appendChild(fuentesDiv);
      }
    } catch (err) {
      pensando.remove();
      agregarMensaje("⚠️ No pude conectar con el servidor. Verifica que el backend esté activo.", "ia");
    }

    enviarBtn.disabled = false;
    entradaEl.focus();
  }

  enviarBtn.addEventListener("click", enviarPregunta);
  entradaEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") enviarPregunta();
  });
</script>

</body>
</html>
